<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1460" font-family="Arial, sans-serif" font-size="12" fill="#111" stroke="#111">
  <rect width="1100" height="1460" fill="#fff" stroke="none"/>

  <!-- SIDEBAR -->
  <rect x="10" y="10" width="180" height="1440" fill="none" stroke="#111" stroke-width="1.5"/>
  <rect x="10" y="10" width="180" height="50" fill="none" stroke="#111" stroke-width="1.5"/>
  <text x="100" y="40" text-anchor="middle" font-size="13" font-weight="bold">OBE SYSTEM</text>
  <rect x="18" y="72" width="164" height="28" fill="none" stroke="#111" stroke-width="1"/>
  <text x="30" y="91" font-size="12">Dashboard</text>
  <rect x="18" y="106" width="164" height="28" fill="none" stroke="#111" stroke-width="1"/>
  <text x="30" y="125" font-size="12">Nilai</text>
  <rect x="18" y="140" width="164" height="28" fill="none" stroke="#111" stroke-width="1"/>
  <text x="30" y="159" font-size="12">Capaian CPL</text>
  <rect x="18" y="174" width="164" height="28" fill="none" stroke="#111" stroke-width="1"/>
  <text x="30" y="193" font-size="12">Laporan CPMK</text>
  <rect x="18" y="208" width="164" height="28" fill="#ddd" stroke="#111" stroke-width="1"/>
  <text x="30" y="227" font-size="12">Laporan CPL</text>

  <!-- TOP NAVBAR -->
  <rect x="200" y="10" width="890" height="50" fill="none" stroke="#111" stroke-width="1.5"/>
  <text x="220" y="40" font-size="14" font-weight="bold">Laporan CPL — Pemenuhan Capaian Pembelajaran</text>
  <circle cx="1060" cy="35" r="16" fill="none" stroke="#111" stroke-width="1.5"/>
  <text x="1060" y="40" text-anchor="middle" font-size="12">A</text>

  <!-- TOP ACTION BAR -->
  <rect x="200" y="70" width="890" height="42" fill="none" stroke="#111" stroke-width="1"/>
  <rect x="210" y="80" width="80" height="24" rx="3" fill="none" stroke="#111" stroke-width="1"/>
  <text x="250" y="96" text-anchor="middle" font-size="11">← Kembali</text>
  <rect x="1040" y="80" width="42" height="24" rx="3" fill="#555" stroke="none"/>
  <text x="1061" y="96" text-anchor="middle" font-size="10" fill="#fff">↓ ZIP</text>

  <!-- PORTFOLIO CARD -->
  <rect x="200" y="122" width="890" height="1328" fill="none" stroke="#111" stroke-width="1.5"/>

  <!-- HEADER -->
  <text x="645" y="158" text-anchor="middle" font-size="15" font-weight="bold">LAPORAN PEMENUHAN CAPAIAN PEMBELAJARAN LULUSAN (CPL)</text>
  <text x="645" y="178" text-anchor="middle" font-size="12">Program Studi: Teknik Informatika</text>
  <text x="645" y="194" text-anchor="middle" font-size="12">Tahun Akademik: 2024/2025 | Angkatan: 2021</text>

  <!-- SECTION 1: Identitas Program Studi -->
  <text x="220" y="222" font-size="12" font-weight="bold">1. Identitas Program Studi</text>
  <rect x="220" y="228" width="860" height="144" fill="none" stroke="#111" stroke-width="1"/>
  <line x1="430" y1="228" x2="430" y2="372" stroke="#111" stroke-width="0.8"/>
  <line x1="220" y1="252" x2="1080" y2="252" stroke="#ccc" stroke-width="0.8"/>
  <line x1="220" y1="276" x2="1080" y2="276" stroke="#ccc" stroke-width="0.8"/>
  <line x1="220" y1="300" x2="1080" y2="300" stroke="#ccc" stroke-width="0.8"/>
  <line x1="220" y1="324" x2="1080" y2="324" stroke="#ccc" stroke-width="0.8"/>
  <line x1="220" y1="348" x2="1080" y2="348" stroke="#ccc" stroke-width="0.8"/>
  <text x="228" y="245" font-size="11" font-weight="bold">Nama Program Studi</text>
  <text x="438" y="245" font-size="11">Teknik Informatika</text>
  <text x="228" y="269" font-size="11" font-weight="bold">Fakultas</text>
  <text x="438" y="269" font-size="11">Teknik</text>
  <text x="228" y="293" font-size="11" font-weight="bold">Perguruan Tinggi</text>
  <text x="438" y="293" font-size="11">Universitas Palangka Raya</text>
  <text x="228" y="317" font-size="11" font-weight="bold">Tahun Akademik</text>
  <text x="438" y="317" font-size="11">2024/2025</text>
  <text x="228" y="341" font-size="11" font-weight="bold">Angkatan</text>
  <text x="438" y="341" font-size="11">2021</text>
  <text x="228" y="365" font-size="11" font-weight="bold">Ketua Prodi</text>
  <text x="438" y="365" font-size="11">Dr. Ketua Prodi, M.Kom</text>

  <!-- SECTION 2: Daftar CPL -->
  <text x="220" y="396" font-size="12" font-weight="bold">2. Daftar CPL Program Studi</text>
  <rect x="220" y="402" width="860" height="120" fill="none" stroke="#111" stroke-width="1"/>
  <rect x="220" y="402" width="860" height="24" fill="#eee" stroke="#111" stroke-width="0.8"/>
  <line x1="360" y1="402" x2="360" y2="522" stroke="#111" stroke-width="0.8"/>
  <line x1="840" y1="402" x2="840" y2="522" stroke="#111" stroke-width="0.8"/>
  <text x="290" y="419" text-anchor="middle" font-size="10" font-weight="bold">Kode CPL</text>
  <text x="600" y="419" text-anchor="middle" font-size="10" font-weight="bold">Rumusan CPL</text>
  <text x="960" y="419" text-anchor="middle" font-size="10" font-weight="bold">Sumber Turunan (Profil Lulusan)</text>
  <line x1="220" y1="426" x2="1080" y2="426" stroke="#ccc" stroke-width="0.8"/>
  <text x="290" y="442" text-anchor="middle" font-size="10">CPL-01</text>
  <text x="600" y="442" text-anchor="middle" font-size="10">Bertakwa kepada Tuhan Yang Maha Esa...</text>
  <text x="960" y="442" text-anchor="middle" font-size="10">Sarjana Komputer</text>
  <line x1="220" y1="450" x2="1080" y2="450" stroke="#ccc" stroke-width="0.8"/>
  <text x="290" y="466" text-anchor="middle" font-size="10">CPL-02</text>
  <text x="600" y="466" text-anchor="middle" font-size="10">Mampu menerapkan pemikiran logis...</text>
  <text x="960" y="466" text-anchor="middle" font-size="10">Programmer</text>
  <line x1="220" y1="474" x2="1080" y2="474" stroke="#ccc" stroke-width="0.8"/>
  <text x="645" y="506" text-anchor="middle" font-size="10" fill="#888">... baris selanjutnya ...</text>

  <!-- SECTION 3: Matriks CPMK-CPL -->
  <text x="220" y="546" font-size="12" font-weight="bold">3. Matriks CPMK terhadap CPL</text>
  <rect x="220" y="552" width="860" height="148" fill="none" stroke="#111" stroke-width="1"/>
  <rect x="220" y="552" width="860" height="24" fill="#eee" stroke="#111" stroke-width="0.8"/>
  <line x1="460" y1="552" x2="460" y2="700" stroke="#111" stroke-width="0.8"/>
  <line x1="620" y1="552" x2="620" y2="700" stroke="#111" stroke-width="0.8"/>
  <line x1="780" y1="552" x2="780" y2="700" stroke="#111" stroke-width="0.8"/>
  <text x="340" y="569" text-anchor="middle" font-size="10" font-weight="bold">Mata Kuliah (MK)</text>
  <text x="540" y="569" text-anchor="middle" font-size="10" font-weight="bold">Kode CPMK</text>
  <text x="700" y="569" text-anchor="middle" font-size="10" font-weight="bold">Bobot CPMK pada MK</text>
  <text x="930" y="569" text-anchor="middle" font-size="10" font-weight="bold">CPL Terkait</text>
  <line x1="220" y1="576" x2="1080" y2="576" stroke="#ccc" stroke-width="0.8"/>
  <!-- rowspan example -->
  <text x="340" y="592" text-anchor="middle" font-size="10" font-weight="bold">Pemrograman Web</text>
  <text x="540" y="592" text-anchor="middle" font-size="10">CPMK-01</text>
  <text x="700" y="592" text-anchor="middle" font-size="10">40%</text>
  <text x="930" y="592" text-anchor="middle" font-size="10">CPL-01, CPL-03</text>
  <line x1="460" y1="600" x2="1080" y2="600" stroke="#ccc" stroke-width="0.8"/>
  <text x="540" y="616" text-anchor="middle" font-size="10">CPMK-02</text>
  <text x="700" y="616" text-anchor="middle" font-size="10">35%</text>
  <text x="930" y="616" text-anchor="middle" font-size="10">CPL-02</text>
  <line x1="460" y1="624" x2="1080" y2="624" stroke="#ccc" stroke-width="0.8"/>
  <text x="540" y="640" text-anchor="middle" font-size="10">CPMK-03</text>
  <text x="700" y="640" text-anchor="middle" font-size="10">25%</text>
  <text x="930" y="640" text-anchor="middle" font-size="10">CPL-01</text>
  <line x1="220" y1="648" x2="1080" y2="648" stroke="#ccc" stroke-width="0.8"/>
  <text x="645" y="680" text-anchor="middle" font-size="10" fill="#888">... baris selanjutnya ...</text>

  <!-- SECTION 4: Rekapitulasi -->
  <text x="220" y="724" font-size="12" font-weight="bold">4. Rekapitulasi Capaian CPL Berdasarkan CPMK — Angkatan 2021</text>
  <rect x="220" y="730" width="860" height="200" fill="none" stroke="#111" stroke-width="1"/>
  <!-- Complex merged header -->
  <rect x="220" y="730" width="860" height="48" fill="#eee" stroke="#111" stroke-width="0.8"/>
  <line x1="340" y1="730" x2="340" y2="930" stroke="#111" stroke-width="0.8"/>
  <line x1="490" y1="730" x2="490" y2="930" stroke="#111" stroke-width="0.8"/>
  <line x1="680" y1="730" x2="680" y2="930" stroke="#111" stroke-width="0.8"/>
  <line x1="870" y1="730" x2="870" y2="930" stroke="#111" stroke-width="0.8"/>
  <text x="280" y="752" text-anchor="middle" font-size="9" font-weight="bold">Kode</text>
  <text x="280" y="764" text-anchor="middle" font-size="9" font-weight="bold">CPL</text>
  <text x="415" y="752" text-anchor="middle" font-size="9" font-weight="bold">CPMK</text>
  <text x="585" y="752" text-anchor="middle" font-size="9" font-weight="bold">MK Kontributor</text>
  <!-- Capaian colspan -->
  <rect x="680" y="730" width="190" height="24" fill="#ddd" stroke="#111" stroke-width="0.8"/>
  <text x="775" y="747" text-anchor="middle" font-size="9" font-weight="bold">Capaian</text>
  <line x1="775" y1="754" x2="775" y2="778" stroke="#111" stroke-width="0.8"/>
  <text x="727" y="762" text-anchor="middle" font-size="9">Rata-rata CPMK</text>
  <text x="822" y="762" text-anchor="middle" font-size="9">CPL (Total Bobot)</text>
  <text x="975" y="752" text-anchor="middle" font-size="9" font-weight="bold">Rata-rata</text>
  <text x="975" y="764" text-anchor="middle" font-size="9" font-weight="bold">Capaian CPL (%)</text>
  <line x1="220" y1="778" x2="1080" y2="778" stroke="#ccc" stroke-width="0.8"/>
  <!-- CPL-01 row (with rowspan) -->
  <text x="280" y="794" text-anchor="middle" font-size="10" font-weight="bold">CPL-01</text>
  <text x="415" y="794" text-anchor="middle" font-size="10">CPMK-01</text>
  <text x="585" y="794" text-anchor="middle" font-size="10">Pemrograman Web</text>
  <text x="727" y="794" text-anchor="middle" font-size="10">88.5 (0.40)</text>
  <text x="822" y="794" text-anchor="middle" font-size="10">37.2 (0.60)</text>
  <text x="975" y="800" text-anchor="middle" font-size="10" font-weight="bold">88.5%</text>
  <line x1="340" y1="802" x2="870" y2="802" stroke="#ccc" stroke-width="0.8"/>
  <text x="415" y="818" text-anchor="middle" font-size="10">CPMK-03</text>
  <text x="585" y="818" text-anchor="middle" font-size="10">Basis Data</text>
  <text x="727" y="818" text-anchor="middle" font-size="10">76.0 (0.35)</text>
  <text x="822" y="818" text-anchor="middle" font-size="10">—</text>
  <line x1="220" y1="826" x2="1080" y2="826" stroke="#ccc" stroke-width="0.8"/>
  <text x="280" y="842" text-anchor="middle" font-size="10" font-weight="bold">CPL-02</text>
  <text x="415" y="842" text-anchor="middle" font-size="10">CPMK-02</text>
  <text x="585" y="842" text-anchor="middle" font-size="10">Pemrograman Web, Jaringan</text>
  <text x="727" y="842" text-anchor="middle" font-size="10">68.4 (0.25)</text>
  <text x="822" y="842" text-anchor="middle" font-size="10">17.1 (0.40)</text>
  <text x="975" y="848" text-anchor="middle" font-size="10" font-weight="bold">68.4%</text>
  <line x1="220" y1="850" x2="1080" y2="850" stroke="#ccc" stroke-width="0.8"/>
  <text x="645" y="910" text-anchor="middle" font-size="10" fill="#888">... baris selanjutnya ...</text>

  <!-- SECTION 5: Analisis Pemenuhan CPL -->
  <text x="220" y="954" font-size="12" font-weight="bold">5. Analisis Pemenuhan CPL</text>
  <rect x="220" y="960" width="860" height="330" fill="none" stroke="#111" stroke-width="1"/>

  <text x="234" y="982" font-size="11" font-weight="bold">Standar Minimal Capaian CPL:</text>
  <text x="440" y="982" font-size="11">75%</text>
  <text x="234" y="1002" font-size="11" font-weight="bold">CPL yang Tercapai:</text>
  <text x="440" y="1002" font-size="11">CPL-01, CPL-03</text>
  <text x="234" y="1022" font-size="11" font-weight="bold">CPL yang Belum Tercapai:</text>
  <text x="440" y="1022" font-size="11">CPL-02 (68.4%), CPL-04 (71.2%)</text>

  <!-- Penyebab ketidakcapaian -->
  <text x="234" y="1046" font-size="11" font-weight="bold">Penyebab Utama Ketidakcapaian:</text>
  <rect x="1020" y="1038" width="40" height="20" rx="3" fill="none" stroke="#111" stroke-width="1"/>
  <text x="1040" y="1052" text-anchor="middle" font-size="10">✏ Edit</text>

  <rect x="234" y="1054" width="826" height="50" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="648" y="1078" text-anchor="middle" font-size="11">Kurangnya latihan soal pada CPMK yang mendukung CPL-02</text>
  <text x="648" y="1094" text-anchor="middle" font-size="11">dan CPL-04. Perlu revisi metode pembelajaran.</text>

  <!-- Edit mode penyebab -->
  <rect x="234" y="1112" width="826" height="60" fill="#fafafa" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="248" y="1132" font-size="10">[Edit Mode - Penyebab: radio Auto/Manual]</text>
  <text x="248" y="1148" font-size="10">  ○ Otomatis — pilih template analisis penyebab (+ Edit Template per template)</text>
  <text x="248" y="1164" font-size="10">  ○ Manual — textarea tulis sendiri → Simpan / Batal</text>

  <!-- Rencana perbaikan / CQI -->
  <text x="234" y="1190" font-size="11" font-weight="bold">Rencana Perbaikan (CQI):</text>
  <rect x="1020" y="1182" width="40" height="20" rx="3" fill="none" stroke="#111" stroke-width="1"/>
  <text x="1040" y="1196" text-anchor="middle" font-size="10">✏ Edit</text>

  <rect x="234" y="1198" width="826" height="50" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="648" y="1222" text-anchor="middle" font-size="11">Menambah sesi latihan soal terstruktur dan mengubah</text>
  <text x="648" y="1238" text-anchor="middle" font-size="11">metode penilaian menjadi berbasis proyek.</text>

  <!-- Edit mode rencana -->
  <rect x="234" y="1256" width="826" height="30" fill="#fafafa" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="248" y="1274" font-size="10">[Edit Mode CQI: textarea + Auto/Manual + Simpan/Batal]</text>

  <text x="220" y="1320" font-size="10" fill="#555">Note: Tombol Download ZIP mengekspor seluruh laporan sebagai arsip</text>
  <text x="220" y="1336" font-size="10" fill="#555">Tabel Seksyen 4 menggunakan rowspan pada kolom Kode CPL dan Rata-rata Capaian CPL</text>
  <text x="220" y="1352" font-size="10" fill="#555">Capaian: hijau (≥ standar minimal), merah (&lt; standar minimal)</text>
</svg>
