<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1340" font-family="Arial, sans-serif" font-size="12" fill="#111" stroke="#111">
  <rect width="1100" height="1340" fill="#fff" stroke="none"/>

  <!-- SIDEBAR -->
  <rect x="10" y="10" width="180" height="1320" fill="none" stroke="#111" stroke-width="1.5"/>
  <rect x="10" y="10" width="180" height="50" fill="none" stroke="#111" stroke-width="1.5"/>
  <text x="100" y="40" text-anchor="middle" font-size="13" font-weight="bold">OBE SYSTEM</text>
  <rect x="18" y="72" width="164" height="28" fill="none" stroke="#111" stroke-width="1"/>
  <text x="30" y="91" font-size="12">Dashboard</text>
  <rect x="18" y="106" width="164" height="28" fill="none" stroke="#111" stroke-width="1"/>
  <text x="30" y="125" font-size="12">Nilai</text>
  <rect x="18" y="140" width="164" height="28" fill="none" stroke="#111" stroke-width="1"/>
  <text x="30" y="159" font-size="12">Capaian CPMK</text>
  <rect x="18" y="174" width="164" height="28" fill="#ddd" stroke="#111" stroke-width="1"/>
