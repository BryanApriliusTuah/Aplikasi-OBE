  <rect x="18" y="208" width="164" height="28" fill="none" stroke="#111" stroke-width="1"/>
  <text x="30" y="227" font-size="12">Laporan CPL</text>

  <!-- TOP NAVBAR -->
  <rect x="200" y="10" width="890" height="50" fill="none" stroke="#111" stroke-width="1.5"/>
